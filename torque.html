<!DOCTYPE html>
<html>

<body>

<h1>トルク計算</h1>

<hr>

<h2>① 出力と回転数から求める</h2>

出力(kW)

<input id="power">

回転数(rpm)

<input id="rpm">

<button onclick="calc()">計算</button>

<p id="result"></p>

<hr>

<h2>② 力と距離から求める</h2>



力 F (N)

<input id="force">

距離 r (m)

<input id="radius">

<button onclick="calcForce()">計算</button>

<p id="result2"></p>

<h2>計算式</h2>

<p>
T = F × r
</p>

<img src="images/torque-diagram.svg">
     alt="トルク計算図解"
     width="700">
     

<hr>

 
  

<script>

function calc(){

let power =
parseFloat(document.getElementById("power").value);

let rpm =
parseFloat(document.getElementById("rpm").value);

let torque =
9550 * power / rpm;

document.getElementById("result")
.innerHTML =
"トルク = "
+ torque.toFixed(2)
+ " N·m";

}

function calcForce(){

let force =
parseFloat(document.getElementById("force").value);

let radius =
parseFloat(document.getElementById("radius").value);

let torque =
force * radius;

document.getElementById("result2").innerHTML =
"トルク = " +
torque.toFixed(2) +
" N·m";

}
  

</script>

</body>
</html>
