<!DOCTYPE html>
<html>

<head>

<title>トルク計算</title>

<script>
window.MathJax = {
  chtml: {
    displayAlign: 'left'
  }
};
</script>

<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

</head>

<body>

<h1>トルク計算</h1>

<hr>

<h2>① 出力と回転数から求める</h2>

出力(kW)

<input id="power">

回転数(rpm)

<input id="rpm">

<button onclick="calc()">計算</button>

<h3>計算式</h3>

\[
T(N\cdot m)=\frac{9550 \times P(kW)}{N(rpm)}=\frac{P(kW)\times1000}{N(rpm)\times2π/60}=\frac{6000}{2π}\times\frac{P}{N}
\]

<p>
T：トルク (N·m)<br>
P：出力 (kW)<br>
N：回転数 (rpm)
</p>

<p id="result"></p>

<hr>

<h2>② 力と距離から求める</h2>

力 F (N)

<input id="force">

距離 r (m)

<input id="radius">

<button onclick="calcForce()">計算</button>

<h3>計算式</h3>

<p>
T = F × r
</p>

<img src="images/torque-diagram.svg"
     alt="トルク計算図解"
     width="700">

<p id="result2"></p>

<hr>

<script>

function calc(){

let power =
parseFloat(document.getElementById("power").value);

let rpm =
parseFloat(document.getElementById("rpm").value);

if(isNaN(power) || isNaN(rpm) || rpm === 0){

document.getElementById("result").innerHTML =
"数値を入力してください";

return;

}

let torque =
9550 * power / rpm;

document.getElementById("result").innerHTML =
"トルク = "
+ torque.toFixed(2)
+ " N·m";

}

function calcForce(){

let force =
parseFloat(document.getElementById("force").value);

let radius =
parseFloat(document.getElementById("radius").value);

if(isNaN(force) || isNaN(radius)){

document.getElementById("result2").innerHTML =
"数値を入力してください";

return;

}

let torque =
force * radius;

document.getElementById("result2").innerHTML =
"トルク = "
+ torque.toFixed(2)
+ " N·m";

}

</script>

</body>
</html>
